<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1E40AF">
<title>Заявка на кредит</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 16px;
    line-height: 1.5;
  }
  .page {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .card {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .brand img {
    display: block;
    max-width: 220px;
    width: 100%;
    height: auto;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 24px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.2px;
  }
  .subtitle {
    margin: 0 0 24px;
    color: #64748b;
    font-size: 14px;
  }
  .divider {
    height: 3px;
    width: 56px;
    background: #DC2626;
    border-radius: 2px;
    margin-bottom: 24px;
  }
  form { display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    letter-spacing: 0.1px;
  }
  label .req { color: #DC2626; margin-left: 2px; }
  input, select, textarea {
    width: 100%;
    font: inherit;
    color: #0f172a;
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 14px 14px;
    font-size: 16px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  input::placeholder, textarea::placeholder { color: #9ca3af; }
  input:hover, select:hover, textarea:hover { border-color: #94a3b8; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1E40AF;
    box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.15);
    background: #ffffff;
  }
  textarea { min-height: 96px; resize: vertical; font-family: inherit; }
  select {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%231E40AF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' d='M1 1l5 5 5-5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 40px;
  }
  /* hide number arrows */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  .submit {
    margin-top: 6px;
    width: 100%;
    border: none;
    cursor: pointer;
    background: #DC2626;
    color: #ffffff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.2px;
    padding: 16px 18px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(220, 38, 38, 0.25);
    transition: transform 0.05s ease, background 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 56px;
  }
  .submit:hover { background: #b91c1c; }
  .submit:active { transform: translateY(1px); }
  .submit:disabled {
    background: #94a3b8;
    box-shadow: none;
    cursor: not-allowed;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(255, 255, 255, 0.4);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .submit.loading .spinner { display: inline-block; }
  .submit.loading .label { opacity: 0.85; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .message {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    text-align: center;
  }
  .message.success {
    display: block;
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }
  .message.error {
    display: block;
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .footer-note {
    margin-top: 18px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
    line-height: 1.5;
  }
  .footer-note b { color: #1E40AF; }

  @media (max-width: 480px) {
    .page { padding: 16px 12px 32px; }
    .card { padding: 24px 20px; border-radius: 14px; }
    h1 { font-size: 22px; }
    input, select, textarea { padding: 13px 13px; }
  }
</style>
</head>
<body>
  <div class="page">
    <main class="card" role="main">
      <div class="brand">
        <img src="logo.png" alt="Молия Finance">
      </div>

      <h1>Заявка на кредит</h1>
      <p class="subtitle">Заполните короткую анкету — мы свяжемся с вами в течение рабочего дня.</p>
      <div class="divider"></div>

      <form id="leadForm" novalidate>
        <div class="field">
          <label for="fio">ФИО клиента<span class="req">*</span></label>
          <input id="fio" name="fio" type="text" autocomplete="name" required placeholder="Иванов Иван Иванович">
        </div>

        <div class="field">
          <label for="phone">Телефон<span class="req">*</span></label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" required placeholder="+992">
        </div>

        <div class="field">
          <label for="city">Город<span class="req">*</span></label>
          <input id="city" name="city" type="text" autocomplete="address-level2" required placeholder="Душанбе">
        </div>

        <div class="field">
          <label for="amount">Запрашиваемая сумма кредита (TJS)<span class="req">*</span></label>
          <input id="amount" name="amount" type="number" inputmode="numeric" min="1" step="1" required placeholder="5000">
        </div>

        <div class="field">
          <label for="source">Источник лида<span class="req">*</span></label>
          <select id="source" name="source" required>
            <option value="" disabled selected>Выберите вариант</option>
            <option>Соцсети</option>
            <option>Website</option>
            <option>Холодные звонки</option>
            <option>Реклама в Мета</option>
            <option>Email</option>
            <option>Жалоба</option>
          </select>
        </div>

        <div class="field">
          <label for="comment">Комментарий</label>
          <textarea id="comment" name="comment" placeholder="Дополнительная информация (необязательно)"></textarea>
        </div>

        <button class="submit" id="submitBtn" type="submit">
          <span class="spinner" aria-hidden="true"></span>
          <span class="label">Отправить</span>
        </button>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>

      <p class="footer-note">Нажимая «Отправить», вы соглашаетесь с обработкой персональных данных.</p>
    </main>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgHr7DbNPQQs1QYgOIs0Kw_AruF89aYWWaM77V-mvQd2DBVXGWhQEp6ensa9f5vlJdlQ/exec";

  const form = document.getElementById("leadForm");
  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("message");

  function showMessage(text, type) {
    msg.textContent = text;
    msg.className = "message " + type;
  }
  function clearMessage() {
    msg.textContent = "";
    msg.className = "message";
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    clearMessage();

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const data = {
      fio: form.fio.value.trim(),
      phone: form.phone.value.trim(),
      city: form.city.value.trim(),
      amount: form.amount.value.trim(),
      source: form.source.value,
      comment: form.comment.value.trim()
    };

    btn.disabled = true;
    btn.classList.add("loading");

    try {
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data)
      });
      // With mode "no-cors" the response is opaque — treat reaching this point as success.
      showMessage("Данные отправлены", "success");
      form.reset();
    } catch (err) {
      showMessage("Ошибка отправки, попробуйте ещё раз", "error");
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  });
</script>
</body>
</html>
